<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuadSim — Quadcopter simulation &amp; flight control</title>
  <meta
    name="description"
    content="QuadSim is a browser-based quadcopter simulation and flight-control lab: configure physics and missions, run the sim in WebAssembly, and explore 3D flight with synced telemetry charts."
  />
  <meta
    name="keywords"
    content="QuadSim, quadcopter simulation, drone simulator, flight control, PID, telemetry, WebAssembly, Three.js, browser simulation"
  />
  <meta name="author" content="John Dews-Flick" />
  <meta name="creator" content="John Dews-Flick" />
  <meta name="publisher" content="John Dews-Flick" />
  <link rel="author" href="https://johndews.com/" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="googlebot" content="index, follow" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="dark" />
  <meta name="format-detection" content="telephone=no" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="QuadSim" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:title" content="QuadSim — Quadcopter simulation &amp; flight control" />
  <meta
    property="og:description"
    content="Interactive quadcopter simulation and controller tuning in the browser: 3D view, mission timeline, and live telemetry charts powered by Rust/WebAssembly."
  />
  <meta property="og:image" content="quad_sim_logo.png" />
  <meta property="og:image:alt" content="QuadSim — quadcopter illustration with thrust, gravity, and control cues" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="QuadSim — Quadcopter simulation &amp; flight control" />
  <meta
    name="twitter:description"
    content="Interactive quadcopter simulation and controller tuning in the browser: 3D view, mission timeline, and live telemetry charts."
  />
  <meta name="twitter:image" content="quad_sim_logo.png" />

  <link rel="icon" type="image/png" href="./quad_sim_logo.png" />
  <link rel="apple-touch-icon" href="./quad_sim_logo.png" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "QuadSim",
      "description": "Browser-based quadcopter simulation and flight-control dashboard with 3D visualization and telemetry charts.",
      "applicationCategory": "SimulationApplication",
      "operatingSystem": "Web browser",
      "browserRequirements": "Requires JavaScript. Uses WebAssembly for the physics simulation.",
      "author": {
        "@type": "Person",
        "name": "John Dews-Flick",
        "url": "https://johndews.com/"
      },
      "creator": {
        "@type": "Person",
        "name": "John Dews-Flick",
        "url": "https://johndews.com/"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
</head>
<body>
  <div class="dashboard-shell" id="dashboardShell">
    <main class="primary-column" id="primaryColumn">
      <article class="panel scene-panel">
        <div class="scene-canvas-container">
          <div class="scene-canvas" id="sceneCanvas"></div>
          <div class="view-controls-overlay">
            <button type="button" id="viewTrackButton" class="secondary active">Track</button>
            <button type="button" id="viewFollowButton" class="secondary">Follow</button>
            <div class="settings-container">
              <button type="button" id="sceneSettingsButton" title="3D Settings">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
              </button>
              <div id="sceneSettingsPanel" class="settings-popover" style="display: none;">
                <label title="Visual scale of the quadrotor rendering">
                  <span>Vehicle Scale</span>
                  <input type="range" id="vehicleScaleInput" min="0.5" max="10" step="0.5" value="4.0" title="Visual scale of the quadrotor rendering" />
                </label>
                <label title="Thickness of the flight trajectory path line">
                  <span>Path Width</span>
                  <input type="range" id="pathWidthInput" min="1" max="20" step="1" value="1.5" title="Thickness of the flight trajectory path line" />
                </label>
                <label title="Field used to color the flight path">
                  <span>Visualize Path</span>
                  <select id="pathVisualizeSelect">
                    <option value="speed" selected>Speed</option>
                    <option value="altitude">Altitude</option>
                    <option value="acceleration">Acceleration</option>
                    <option value="yaw">Yaw</option>
                  </select>
                </label>
              </div>
            </div>
          </div>
        </div>
      </article>

      <section class="panel tab-panel">
        <header class="tab-header">
          <button class="tab-button active" data-tab="config">Setup</button>
          <button class="tab-button" data-tab="state">Live</button>
          <button class="tab-button" data-tab="summary">Report</button>

          <div class="header-transport">
            <div class="transport-controls">
              <button id="speed1xButton" class="icon-button active" title="1x Speed">1×</button>
              <button id="playPauseButton" class="icon-button primary" title="Play/Pause">
                <svg id="playIcon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
              </button>
              <button id="speed2xButton" class="icon-button" title="2x Speed">2×</button>
            </div>
            <input id="timelineSlider" type="range" min="0" max="0" value="0" step="1" />
            <div class="header-readout" id="sampleTimestamp">t 0.00s</div>
          </div>

          <div class="spacer"></div>
          <div class="tab-actions">
            <button type="submit" form="configForm" class="tab-action-button primary">Run Sim</button>
            <button type="button" id="liveRunButton" class="tab-action-button">Real-time</button>
          </div>
          <div class="status-pill" id="statusPill">Ready</div>
        </header>

        <div class="tab-content active" id="tab-config">
          <form id="configForm" class="config-grid">
            <label title="Total simulation duration in seconds">
              <span>Duration [s]</span>
              <input name="duration_s" type="number" min="5" max="120" step="1" value="60" title="Total simulation duration in seconds" />
            </label>
            <label title="Physics integration time step in seconds">
              <span>dt [s]</span>
              <input name="dt_s" type="number" min="0.002" max="0.05" step="0.001" value="0.01" title="Physics integration time step in seconds" />
            </label>
            <label class="slider-field" title="Maximum thrust-to-weight ratio of the quadrotor">
              <span>T/W Ratio <strong id="thrustToWeightValue">2.25</strong></span>
              <input name="thrust_to_weight_ratio" id="thrustToWeightInput" type="range" min="1.4" max="4.0" step="0.05" value="2.25" title="Maximum thrust-to-weight ratio of the quadrotor" />
            </label>
            <label class="slider-field" title="Multiplier for linear aerodynamic drag">
              <span>Linear Drag <strong id="linearDragValue">1.00</strong></span>
              <input name="linear_drag_scale" id="linearDragInput" type="range" min="0.2" max="3" step="0.05" value="1" title="Multiplier for linear aerodynamic drag" />
            </label>
            <label class="slider-field" title="Multiplier for angular aerodynamic drag">
              <span>Angular Drag <strong id="angularDragValue">1.00</strong></span>
              <input name="angular_drag_scale" id="angularDragInput" type="range" min="0.2" max="3" step="0.05" value="1" title="Multiplier for angular aerodynamic drag" />
            </label>
            <label class="slider-field" title="Standard deviation of gaussian noise added to motor throttles">
              <span>Throttle Noise σ <strong id="noiseValue">0.000</strong></span>
              <input name="throttle_noise_std" id="noiseInput" type="range" min="0" max="0.15" step="0.0025" value="0" title="Standard deviation of gaussian noise added to motor throttles" />
            </label>
            <label class="slider-field" title="Wind turbulence intensity (m/s²)">
              <span>Turbulence <strong id="turbulenceValue">2.00</strong></span>
              <input name="turbulence_intensity" id="turbulenceInput" type="range" min="0" max="5" step="0.1" value="2.0" title="Wind turbulence intensity (m/s²)" />
            </label>
            <label class="slider-field" title="Motor response delay time constant (seconds)">
              <span>Motor Delay [s] <strong id="motorDelayValue">0.050</strong></span>
              <input name="motor_time_constant_s" id="motorDelayInput" type="range" min="0" max="0.2" step="0.005" value="0.05" title="Motor response delay time constant (seconds)" />
            </label>
            <label class="slider-field" title="Ground level altitude (z=0 position)">
              <span>Ground Level [m] <strong id="groundLevelValue">0.00</strong></span>
              <input name="ground_level_m" id="groundLevelInput" type="range" min="-10" max="10" step="0.5" value="0" title="Ground level altitude (z=0 position)" />
            </label>
          </form>
          
          <div class="timeline-editor-panel">
            <div class="panel-header" style="margin-top: 16px;">
              <h2 style="font-size: 0.75rem; text-transform: uppercase; color: var(--muted);">Mission Timeline</h2>
              <button type="button" id="addTimelineEventBtn" class="tab-action-button" style="margin: 0;">+ Add Keyframe</button>
            </div>
            <div id="timelineContainer" class="timeline-container">
              <!-- Timeline items injected here -->
            </div>
          </div>
        </div>

        <div class="tab-content" id="tab-state">
          <div class="telemetry-stack">
            <div class="readout-header">
              <span id="sampleSpeed">speed 0.00 m/s</span>
            </div>
            <div style="display: flex; gap: 16px; margin-bottom: 16px;">
              <canvas id="artificialHorizon" width="200" height="200" style="border: 2px solid #334155; border-radius: 8px; background: #0f172a;"></canvas>
              <canvas id="compassDisplay" width="200" height="200" style="border: 2px solid #334155; border-radius: 8px; background: #0f172a;"></canvas>
            </div>
            <div class="detail-grid" id="detailGrid"></div>
          </div>
        </div>

        <div class="tab-content" id="tab-summary">
          <section class="metrics-grid" id="metricsGrid"></section>
        </div>
      </section>
    </main>

    <div class="resizer" id="resizer"></div>

    <aside class="telemetry-column chart-column" id="chartColumn">
      <section class="panel chart-panel">
        <div class="panel-header chart-panel-header">
          <div class="chart-panel-brand">
            <img class="chart-panel-logo" src="./quad_sim_logo.png" alt="" decoding="async" />
            <div class="chart-panel-heading">
              <p class="eyebrow">QuadSim</p>
              <p class="chart-panel-subtitle">Quadcopter simulation and flight control</p>
              <p class="chart-panel-attribution">
                Made with love by <a href="https://johndews.com" target="_blank" rel="noopener noreferrer">John Dews-Flick</a> · 2026
              </p>
            </div>
          </div>
          <div class="chart-panel-tools">
            <label class="sync-hover-label" style="display: flex; align-items: center; gap: 4px; font-size: 0.65rem; color: var(--muted); cursor: pointer; margin-right: 4px;">
              <input type="checkbox" id="syncHoverCheckbox" checked /> Sync 3D
            </label>
            <button type="button" id="fitChartsButton" class="icon-button-overlay" title="Fit All">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
            </button>
            <button type="button" id="centerChartsButton" class="icon-button-overlay" title="Center">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div class="chart-stack">
          <div id="positionChart" class="chart-host"></div>
          <div id="attitudeChart" class="chart-host"></div>
          <div id="velocityChart" class="chart-host"></div>
          <div id="angularRateChart" class="chart-host"></div>
          <div id="accelerationChart" class="chart-host"></div>
          <div id="motorChart" class="chart-host"></div>
        </div>
      </section>
    </aside>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
